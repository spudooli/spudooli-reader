<!DOCTYPE html>
<html lang="en">

<head>
  <title>Spudooli Reader</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <meta name="csrf-token" content="{{ csrf_token() }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

  <script src="{{ url_for('static', filename='main.js') }}"></script>
  <link href="{{ url_for('static', filename='bootstrap.5.min.css') }}" rel="stylesheet">
  <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">

  <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
</head>

<body>
  <header class="site-header">
    <div class="site-container">
      <a href="/" class="brand">Spudooli Feed Reader</a>
      <nav>
        <a href="/" class="{% if request.path == '/' or request.path == '/stars' %}active{% endif %}">Read</a>
        <a href="/about" class="{% if request.path == '/about' %}active{% endif %}">About</a>
        <a href="/readinglist" class="{% if request.path == '/readinglist' %}active{% endif %}">Reading List</a>
      </nav>
    </div>
  </header>

  {% for message in get_flashed_messages() %}
  <div class="flash">{{ message }}</div>
  {% endfor %}

  {% block content %}{% endblock %}

  <script type="module" src="https://cdnjs.cloudflare.com/ajax/libs/ionicons/8.0.13/ionicons/ionicons.esm.min.js"></script>
  <script nomodule src="https://cdnjs.cloudflare.com/ajax/libs/ionicons/8.0.13/ionicons/ionicons.esm.min.js"></script>

</body>

</html>
